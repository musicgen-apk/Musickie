<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musickie - Putar Musik Kamu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #f0f2f5; padding: 2rem 1rem; }
        .wrapper { max-width: 700px; margin: 0 auto; background: white; border-radius: 10px; padding: 2.5rem; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 2rem; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.7rem; color: #5f6368; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 0.9rem 1.2rem; border: 1px solid #dadce0; border-radius: 6px; font-size: 1rem; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2); }
        textarea { min-height: 90px; resize: vertical; }
        .btn { width: 100%; padding: 1rem; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1557b0; }
        .status { margin-top: 1.5rem; padding: 1rem; border-radius: 6px; display: none; }
        .loading { color: #1a73e8; background: rgba(26, 115, 232, 0.1); }
        .success { color: #0f9d58; background: rgba(15, 157, 88, 0.1); }
        .error { color: #d93025; background: rgba(217, 48, 37, 0.1); }
        .music-player { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #dadce0; }
        .music-player h2 { color: #1a73e8; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .music-item { padding: 1.2rem; border: 1px solid #dadce0; border-radius: 6px; margin-bottom: 1rem; }
        .music-item h3 { color: #202124; margin-bottom: 0.5rem; }
        .music-item p { color: #5f6368; margin-bottom: 1rem; font-size: 0.95rem; }
        audio { width: 100%; border-radius: 6px; }
        footer { text-align: center; margin-top: 1.5rem; color: #5f6368; font-size: 0.9rem; }
        .refresh-btn { margin-top: 1rem; padding: 0.8rem 1.2rem; background: #34a853; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Musickie - Buat & Putar Musik</h1>

        <form id="musicForm">
            <div class="form-group">
                <label for="prompt">Deskripsi Musik:</label>
                <textarea id="prompt" placeholder="Contoh: Lagu piano menenangkan dengan melodi lembut" required></textarea>
            </div>

            <div class="form-group">
                <label for="style">Gaya Musik:</label>
                <select id="style" required>
                    <option value="Classical">Klasik</option>
                    <option value="Jazz">Jazz</option>
                    <option value="Pop">Pop</option>
                    <option value="Ambient">Ambient</option>
                    <option value="Rock">Rock</option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">Judul Musik:</label>
                <input type="text" id="title" placeholder="Contoh: Meditasi Malam Hari" required>
            </div>

            <div class="status loading" id="loading">⏳ Sedang memproses permintaan...</div>
            <button type="submit" class="btn">🎵 Buat Musik Sekarang</button>

            <div class="status success" id="success"></div>
            <div class="status error" id="error"></div>
        </form>

        <!-- Bagian Pemutar Musik -->
        <div class="music-player">
            <h2>🎶 Daftar Musik Kamu</h2>
            <button class="refresh-btn" onclick="loadMusicList()">🔄 Refresh Daftar</button>
            <div id="musicList"></div>
        </div>

        <footer>© 2026 | Musickie Dihost di Render</footer>
    </div>

    <script>
        const form = document.getElementById('musicForm');
        const loading = document.getElementById('loading');
        const success = document.getElementById('success');
        const error = document.getElementById('error');

        // Kirim permintaan buat musik
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loading.style.display = 'block';
            success.style.display = 'none';
            error.style.display = 'none';

            const data = {
                prompt: document.getElementById('prompt').value,
                style: document.getElementById('style').value,
                title: document.getElementById('title').value
            };

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                loading.style.display = 'none';
                const result = await res.json();

                if (res.ok) {
                    success.textContent = `✅ Sukses! Musik "${data.title}" sedang dibuat. ID: ${result.music_id} | Klik Refresh untuk melihat status.`;
                    success.style.display = 'block';
                    form.reset();
                    loadMusicList();
                } else {
                    error.textContent = `❌ Kesalahan: ${result.detail}`;
                    error.style.display = 'block';
                }
            } catch (err) {
                loading.style.display = 'none';
                error.textContent = `❌ Kesalahan Koneksi: ${err.message}`;
                error.style.display = 'block';
            }
        });

        // Muat daftar musik & putar
        async function loadMusicList() {
            try {
                const res = await fetch('/api/music-list');
                const result = await res.json();
                const musicList = document.getElementById('musicList');

                if (Object.keys(result.music).length === 0) {
                    musicList.innerHTML = "<p>Belum ada musik yang dibuat atau diproses.</p>";
                    return;
                }

                musicList.innerHTML = "";
                for (const [id, music] of Object.entries(result.music)) {
                    const item = document.createElement('div');
                    item.className = 'music-item';
                    
                    item.innerHTML = `
                        <h3>${music.title}</h3>
                        <p>Gaya: ${music.style} | Status: ${music.status}</p>
                        ${music.audio_url ? 
                            `<audio controls>
                                <source src="${music.audio_url}" type="audio/mpeg">
                                Browser kamu tidak mendukung pemutar audio.
                            ` : 
                            `<p>🔄 Tunggu sebentar atau refresh lagi untuk putar musik.</p>`
                        }
                    `;
                    
                    musicList.appendChild(item);
                }
            } catch (err) {
                document.getElementById('musicList').innerHTML = `<p class="error">❌ Gagal memuat daftar musik: ${err.message}</p>`;
            }
        }

        // Muat daftar saat halaman dibuka
        window.onload = loadMusicList;
    </script>
</body>
</html>
